<style>

 .ref b{color:#cdb86a}.ref .fire{color:#ff8a5a}.ref .water{color:#5ab0ff}.ref .wind{color:#6fe0c8}.ref .earth{color:#caa46a}.ref .rune{color:#ffcf8a}

 .mp input{width:100%;background:#0d1310;border:1px solid #283126;border-radius:4px;color:#e8eefc;padding:5px 7px;font:inherit}
 .mp button{background:#2a2218;border:1px solid #5e4a24;border-radius:4px;color:#eadca8;padding:5px 8px;font:inherit;cursor:pointer}

<div class="wrap">
 <h1>AMC（A Mana Circulation）<small>詠唱時間・ステータス・装備試作</small></h1>
 <canvas id="game" width="900" height="600"></canvas>
 <div class="mp" id="mpPanel">
  <input id="mpPhrase" placeholder="合言葉">
  <input id="mpPass" type="password" placeholder="password">
  <input id="mpUrl" type="hidden">
  <input id="mpKey" type="hidden">
  <button id="mpHost">Host</button>
  <button id="mpJoin">Join</button>
  <div class="st" id="mpStatus">multiplayer off</div>
 </div>
 <div class="hint">
  <kbd>WASD</kbd>移動 / <kbd>Space</kbd>詠唱開始・確定 / <kbd>Esc</kbd>中断 / <kbd>Shift</kbd>バリア(押した瞬間=<b>パリィ</b>) / <kbd>Ctrl</kbd>テレポート / <kbd>1</kbd>HP薬 <kbd>2</kbd>MP薬 / <kbd>M</kbd>魔法一覧 / <kbd>I</kbd>キャラ画面　※開始地点の<b>町ルーン</b>に5施設<br>
  入力中の文字はキャラの頭上に表示。詠唱中も移動・連続詠唱OK。大魔法ほど詠唱が長く<b>DEX</b>で短縮。敵を倒すと<b>装備品</b>がドロップ。
 </div>
 <div class="ref" id="ref"></div>
</div>

 for(const[rd,obj]of RUNE_N)if(rd.length>bl&&nk.startsWith(rd,i)&&P.runes.has(obj.name)){best=obj;bl=rd.length;}
 if(best&&i+bl<nk.length){if(!seen.has(best.name)){runes.push(best);seen.add(best.name);}i+=bl;continue;}break;}

function genQuestBoard(){const pool=[...QPOOL];P.questBoard=[];for(let i=0;i<4&&pool.length;i++){const key=pool.splice(Math.floor(Math.random()*pool.length),1)[0],t=ET[key],need=8+Math.floor(Math.random()*8);P.questBoard.push({key,jp:t.jp,need,count:0,gem:Math.round(need*t.exp*4),exp:Math.round(need*t.exp*7),accepted:false,claimed:false});}}
function acceptQuest(q){if(P.quests.length>=5){flash('受注は5件まで');se('error');return;}q.accepted=true;P.quests.push(q);const bi=P.questBoard.indexOf(q);if(bi>=0)P.questBoard.splice(bi,1);flash('クエスト受注：'+q.jp+'×'+q.need);se('quest');}
function questProgress(key){for(const q of P.quests)if(q.key===key&&q.count<q.need){q.count++;if(q.count>=q.need)flash('クエスト達成！ギルドで報酬を受け取ろう');}
 for(const n of npcs)if(n.q&&n.q.key===key&&n.q.count<n.q.need){n.q.count++;if(n.q.count>=n.q.need)flash(n.name+'の依頼を達成！ 話しかけて報酬を受け取ろう');}}
function fameNeed(lv){return Math.round(60*Math.pow(1.45,lv-1));}
function fameReward(lv){gainGem(200*lv);
 if(lv%5===0){const u=genRelic((Math.floor(lv/5)-1)%RELICS.length);if(P.inv.length<24)P.inv.push(u);dropSE(u.rar);flash('★名声Lv'+lv+'！ 固有報酬「'+u.name+'」を獲得');}
 else if(lv%2===0){const it=genItem(P.lv,false,['R','E','L'][(Math.random()*3)|0]);if(P.inv.length<24)P.inv.push(it);dropSE(it.rar);flash('名声Lv'+lv+' 到達！ 報酬装備：'+it.name);}
 else{const r=grantRandomRune(1);if(!r){const it=genItem(P.lv,false,'R');if(P.inv.length<24)P.inv.push(it);flash('名声Lv'+lv+' 到達！ 報酬装備：'+it.name);}else flash('名声Lv'+lv+' 到達！ ＋'+(200*lv)+'gem');}}
function addFame(n){P.fame+=n;let lv=P.fameLv||1;while(P.fame>=fameNeed(lv)){P.fame-=fameNeed(lv);lv++;fameReward(lv);}P.fameLv=lv;}
function claimQuest(q){if(q.count<q.need)return;gainGem(q.gem);gainExp(q.exp);grantRandomRune(0.5);addFame(q.need*3+10);const i=P.quests.indexOf(q);if(i>=0)P.quests.splice(i,1);flash('報酬獲得：◆'+fmt(q.gem)+' / '+fmt(q.exp)+'EXP ＋名声'+(q.need*3+10));se('quest');}
function cancelQuest(q){const i=P.quests.indexOf(q);if(i>=0)P.quests.splice(i,1);flash('クエストをキャンセルしました');se('ui');}
function refreshBoard(){const left=180000-(performance.now()-P.questBoardAt);if(left>0){flash('ボード更新まで '+Math.ceil(left/1000)+'秒');se('error');return;}genQuestBoard();P.questBoardAt=performance.now();flash('依頼ボードを更新');se('quest');}

 'マナ嵐':{col:'#9a6ad0',expMul:1.4,gemMul:1.4,dropMul:1.8,spawnAdd:4,note:'敵増・ドロップ増（高リスク高報酬）'},
 '宝物雨':{col:'#7fd0ff',expMul:1,gemMul:1.6,dropMul:2.6,spawnAdd:0,note:'装備ドロップ大幅増'},
 '豊潤の霧':{col:'#7fe0a0',expMul:1.4,gemMul:1.4,dropMul:1.4,spawnAdd:1,note:'全体的に小幅増'}};
const WKEYS=Object.keys(WTYPES),WMAPS=['field','forest','volcano','cavern','ruins','desert','sky','abyss','grove','crystal'];
let weathers=[],weatherCD=6;
function spawnWeather(){if(weathers.length>=2)return;const type=WKEYS[Math.floor(Math.random()*WKEYS.length)],map=WMAPS[Math.floor(Math.random()*WMAPS.length)],dur=180+Math.random()*240;
 weathers.push({map,type,x:360+Math.random()*(WORLD_W-720),y:360+Math.random()*(WORLD_H-720),r:340+Math.random()*150,t:dur,dur});}
function updateWeather(dt){weatherCD-=dt;if(weatherCD<=0&&weathers.length<2){spawnWeather();weatherCD=25+Math.random()*45;}for(const w of weathers)w.t-=dt;weathers=weathers.filter(w=>w.t>0);}
function weatherAt(x,y){for(const w of weathers)if(w.map===MAPID&&Math.hypot(x-w.x,y-w.y)<w.r)return w;return null;}
function wmul(x,y,k){const w=weatherAt(x,y);return w?WTYPES[w.type][k]:1;}

 for(let i=0;i<3;i++){const[k,v]=sp[(h+i)%6];stats[k]=v;}const aff={'allstat%':18};if(e.el!=='無')aff[e.el+'%']=55;

function switchMap(id,x,y){for(const en of enemies)if(en.eliteRec)en.eliteRec.hp=en.hp;MAP=MAPS[id];MAPID=id;dummy=(id==='town')?makeDummy():null;
 if(MAP.town){P.lastTown=id;for(const n of npcs){n.map=id;n.x=WORLD_W/2+(Math.random()*700-350);n.y=WORLD_H/2+(Math.random()*460-230);n.talk=false;n.reactT=0;}}P.x=x;P.y=y;enemies=[];shots=[];eshots=[];parts=[];floats=[];fx=[];zones=[];funnels=[];pending=[];passers=[];boss=null;bossCD=MAP.boss?3:1e9;P.invuln=1.2;P.casting=false;P.channels=[];P.kana='';P.pend='';if(!MAP.town)for(let i=0;i<5;i++)spawnEnemy();playBgmForMap();flash(MAP.name+' へ移動');}

  if(e.key==='Escape'||e.key==='i'||e.key==='I'){P.menu=false;P.nameEdit=false;se('ui');}return;}

 if(e.code==='Space'){e.preventDefault();P.casting=true;P.kana='';P.pend='';se('castStart');return;}

 if((e.code==='ControlLeft'||e.code==='ControlRight'||e.key==='Control')&&!P.casting){e.preventDefault();if(P.tpCD<=0){const d=187;burst(P.x,P.y,'#b48cff',14,4);P.x=Math.max(P.r,Math.min(WORLD_W-P.r,P.x+P.face.x*d));P.y=Math.max(P.r,Math.min(WORLD_H-P.r,P.y+P.face.y*d));burst(P.x,P.y,'#b48cff',16,5);P.tpCD=Math.max(1,3-effStat('AGI')*0.03);se('teleport');}return;}
 if(['w','a','s','d','W','A','S','D'].includes(e.key))held[e.key.length===1?e.key.toLowerCase():e.key]=true;
});

function flash(t){msg=t;msgT=1.8;}

function getBuffs(){const r={pow:0,crit:0,burn:0,def:0,regen:0,mpregen:0,spd:0};buffs.forEach(b=>r[b.kind]+=b.amt);return r;}
const BLABEL={pow:'威力',crit:'クリ',burn:'火傷',def:'防御',regen:'再生'},BCOL={pow:'#ffb347',crit:'#ff6fae',burn:'#ff7a3a',def:'#6fa8ff',regen:'#7CFFA0'};
function addBuff(s,dm,am){for(const[k,a,d]of s.buffs)buffs.set(s.name+':'+k,{kind:k,amt:a*(am||1),t:d*(dm||1),dur:d*(dm||1)});}
function nearest(x,y){let b=1e9,t=null;for(const en of enemies){const d=(en.x-x)**2+(en.y-y)**2;if(d<b){b=d;t=en;}}if(boss){const d=(boss.x-x)**2+(boss.y-y)**2;if(d<b){b=d;t=boss;}}if(dummy){const d=(dummy.x-x)**2+(dummy.y-y)**2;if(d<b){b=d;t=dummy;}}return t;}
function setBurn(en,dps,dm){en.burn={dps:Math.max(en.burn?en.burn.dps:0,dps),t:3.5*(dm||1)};}
function setSlow(en,d){en.slow=Math.max(en.slow||0,d);}

 const crit=Math.random()<critBase()+(critEx||0);if(crit)dmg*=1.5;dmg=Math.max(1,Math.round(dmg*(P.hp/P.maxhp)));
 if(en.isDummy){en.dmg=(en.dmg||0)+dmg;en.hp=en.maxhp;floats.push({x:en.x,y:en.y-en.r,txt:fmt(dmg)+(crit?'!':''),col:color,life:.9});burst(en.x,en.y,color,5,3);addHitFx(en,el,color);shake=Math.max(shake,2.5);se('hit');return;}
 en.hp-=dmg;
 floats.push({x:en.x,y:en.y-en.r,txt:fmt(dmg)+(crit?'!':''),col:color,life:.9});burst(en.x,en.y,color,5,3);addHitFx(en,el,color);shake=Math.max(shake,crit?4:2.5);se('hit');
 if(!factor){if(mult>1)floats.push({x:en.x,y:en.y-en.r-16,txt:'弱点!',col:'#ff7a7a',life:.9});else if(mult<1)floats.push({x:en.x,y:en.y-en.r-16,txt:'軽減',col:'#9aa',life:.9});}}
function hurtPlayer(d){if(P.invuln>0)return;
 if(P.parryT>0){P.parryT=0;const R=165;for(const e of targets()){if(Math.hypot(P.x-e.x,P.y-e.y)<R+e.r){e.stun=5;burst(e.x,e.y,'#ffe27a',8,3);}}
  fx.push({x:P.x,y:P.y,r:R,life:0.45,col:'#ffe27a'});burst(P.x,P.y,'#ffe27a',24,6);shake=Math.max(shake,8);P.invuln=0.4;flash('パリィ！ 周囲をスタン');se('parry');return;}

 if(dd>=P.maxhp*0.12&&(P.casting||P.channels.length)){P.casting=false;P.kana='';P.pend='';P.channels=[];flash('詠唱中断！');}}
function targets(){const a=enemies.slice();if(boss)a.push(boss);if(dummy)a.push(dummy);return a;}

function tryCast(){finalize();
 const said=P.kana.trim();
 const ci=NPC_CALL.indexOf(P.kana);if(ci>=0){const n=npcs[ci];n.map=MAPID;n.x=P.x+44;n.y=P.y;n.talk=false;n.reactT=2;n.react='呼ばれて来たよ！';burst(n.x,n.y,n.col,16,4);flash(n.name+'を呼び寄せた');P.casting=false;P.kana='';P.pend='';return;}
 const seg=segment(P.kana);
 if(seg.spell){if(seg.spell.big&&bigCD>0){flash('大魔法は冷却中（'+bigCD.toFixed(1)+'s）');P.casting=false;P.kana='';P.pend='';return;}
  const mod=buildMod(seg.runes);mod._n=seg.runes.length;const cost=incCost(seg.spell,mod);
  if(P.mp>=cost){P.mp-=cost;P.spellsSeen.add(seg.spell.name);const total=castTime(seg.spell,mod);const tg=nearest(P.x,P.y),aim=tg?Math.atan2(tg.y-P.y,tg.x-P.x):Math.atan2(P.face.y,P.face.x),tx=tg?tg.x:P.x+Math.cos(aim)*220,ty=tg?tg.y:P.y+Math.sin(aim)*220;P.channels.push({spell:seg.spell,runes:seg.runes,mod,cost,aim,tx,ty,t:total,total});se(seg.spell.big?'big':'castStart');if(seg.spell.big)bigCD=10;}
  else{flash('マナ不足（必要'+fmt(cost)+'）');se('error');}}
 else if(said){P.say=said.slice(0,32);P.sayT=2.6;se('ui');}
 P.casting=false;P.kana='';P.pend='';}
function fireSpell(s,runes,mod,cost,aim,tgt){
 const m=mod||buildMod(runes||[]);const eff=getBuffs(),big=!!s.big,PI=Math.PI;
 se(big?'big':'cast');if(big)shake=Math.max(shake,18);
 const bd=m.buffDurMul,ba=m.buffAmtMul;
 if(aim===undefined)aim=Math.atan2(P.face.y,P.face.x);
 const mpTgt=tgt||{x:P.x+Math.cos(aim)*220,y:P.y+Math.sin(aim)*220};
 if(s.kind==='return'){mpSendSpell(s,m,cost,aim,mpTgt,0,1);const t=MAPS[P.lastTown]?P.lastTown:'town';burst(P.x,P.y,s.color,24,6);switchMap(t,WORLD_W/2,WORLD_H/2+260);flash('リコール：'+MAPS[t].name+'へ帰還');return;}
 if(s.kind==='heal'){mpSendSpell(s,m,cost,aim,mpTgt,0,1);const amt=Math.round(P.maxhp*s.heal);P.hp=Math.min(P.maxhp,P.hp+amt);floats.push({x:P.x,y:P.y-20,txt:'+'+fmt(amt),col:s.color,life:1});burst(P.x,P.y,s.color,14,3);fx.push({x:P.x,y:P.y,r:8,maxr:48,col:s.color,life:.5});addBuff(s,bd,ba);flash(s.name);return;}
 if(s.kind==='buff'){mpSendSpell(s,m,cost,aim,mpTgt,0,1);addBuff(s,bd,ba);burst(P.x,P.y,s.color,16,4);fx.push({x:P.x,y:P.y,r:10,maxr:48,col:s.color,life:.5});flash(s.name+'！');return;}
 const rPow=big?1+(m.powMul-1)*2:m.powMul,rRad=big?1+(m.radiusMul-1)*2:m.radiusMul;
 const buffPow=big?1+eff.pow*3:1+eff.pow,critEx=big?Math.min(1.5,eff.crit*3):eff.crit;
 const mpBonus=big?1+Math.min(0.6,(cost||0)*0.008):1;
 const base=magicAtk()*s.power*buffPow*rPow*mpBonus*(1+playerAffix(s.el+'%')/100);
 mpSendSpell(s,m,cost,aim,mpTgt,base,rRad);
 const burn=s.burn?s.burn*(1+eff.burn*(big?3:1))*m.burnMul:0,splash=(s.splash||0)*m.splashMul;
 const act=(rep)=>{
  if(s.kind==='self'||s.kind==='meteo'){let cx=P.x,cy=P.y;if(s.kind==='meteo'&&tgt){cx=tgt.x;cy=tgt.y;}
   const rad=s.radius*rRad;fx.push({x:cx,y:cy,r:14,maxr:rad,col:s.color,life:big?.7:.45,el:s.el,area:true});burst(cx,cy,s.color,big?28:14,big?6:4);if(big||s.power>=1.4)shake=Math.max(shake,big?22:5);
