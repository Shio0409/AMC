<title>AMC ― プロト（詠唱時間・ステ・装備）</title>
<style>

 .ref{font-size:11px;color:#7e8a82;max-width:1000px;line-height:1.8;text-align:left;background:#0d1310;border:1px solid #21281f;border-radius:8px;padding:8px 14px;}
 .ref b{color:#cdb86a}.ref .fire{color:#ff8a5a}.ref .water{color:#5ab0ff}.ref .wind{color:#6fe0c8}.ref .earth{color:#caa46a}.ref .rune{color:#ffcf8a}

 .mp{display:grid;grid-template-columns:190px 170px 86px 86px 1fr;gap:6px;align-items:center;width:min(1000px,100%);font-size:11px;color:#aeb8b0}
 .mp input{width:100%;background:#0d1310;border:1px solid #283126;border-radius:4px;color:#e8eefc;padding:5px 7px;font:inherit}
 .mp button{background:#2a2218;border:1px solid #5e4a24;border-radius:4px;color:#eadca8;padding:5px 8px;font:inherit;cursor:pointer}
 .mp button:hover{border-color:#caa64b}
 .mp .st{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#8fa498}

<div class="wrap">
 <h1>AMC（A Mana Circulation）<small>詠唱時間・ステータス・装備試作</small></h1>
 <canvas id="game" width="900" height="600"></canvas>
 <div class="mp" id="mpPanel">
  <input id="mpPhrase" placeholder="合言葉を入力">
  <input id="mpPass" type="password" placeholder="パスワードを入力">
  <input id="mpUrl" type="hidden">
  <input id="mpKey" type="hidden">
  <button id="mpHost">Host</button>
  <button id="mpJoin">Join</button>
  <div class="st" id="mpStatus">multiplayer off</div>
 </div>
 <div class="hint">
  <kbd>WASD</kbd>移動 / <kbd>Space</kbd>詠唱開始・確定 / <kbd>Esc</kbd>中断 / <kbd>Shift</kbd>バリア(押した瞬間=<b>パリィ</b>) / <kbd>Ctrl</kbd>テレポート / <kbd>1</kbd>HP薬 <kbd>2</kbd>MP薬 / 詠唱で「インベントリ」「スペル」「ルーン」<br>
  入力中の文字はキャラの頭上に表示。詠唱中も移動・連続詠唱OK。大魔法ほど詠唱が長く<b>DEX</b>で短縮。敵を倒すと<b>装備品</b>がドロップ。
 </div>
 <div class="ref" id="ref"></div>
</div>

function potCost(k){return Math.round((k==='hp'?18:16)*(1+P.lv*0.25));}
function buyPot(k){const c=potCost(k);if(P.gem<c){flash('gem不足（必要'+fmt(c)+'）');se('error');return;}P.gem-=c;if(k==='hp')P.hpPot++;else P.mpPot++;flash((k==='hp'?'HP':'MP')+'ポーション購入');se('potion');}
function usePot(k){if(k==='hp'){if(P.hpPot<=0){flash('HPポーションがない');se('error');return;}P.hpPot--;const a=Math.round(P.maxhp*0.4);P.hp=Math.min(P.maxhp,P.hp+a);spawnFloat({x:P.x,y:P.y-20,txt:'+'+fmt(a),col:'#7CFFA0',life:1});burst(P.x,P.y,'#7CFFA0',12,3);se('potion');}
  else{if(P.mpPot<=0){flash('MPポーションがない');se('error');return;}P.mpPot--;const a=Math.round(P.maxmp*0.5);P.mp=Math.min(P.maxmp+P.expMP,P.mp+a);spawnFloat({x:P.x,y:P.y-20,txt:'+'+fmt(a),col:'#6fd0ff',life:1});burst(P.x,P.y,'#6fd0ff',12,3);se('potion');}}

function genJewel(tier,typeIdx){tier=Math.max(0,Math.min(5,tier));if(typeIdx===undefined)typeIdx=Math.floor(Math.random()*JTYPES.length);const tp=JTYPES[typeIdx];return{jewel:true,tier,type:typeIdx,name:JRAR[tier]+tp.n,col:tp.col};}
function jewelKey(j){return (j&&j.tier||0)+':'+(j&&j.type||0);}
function jewelGroups(){const g={};for(const j of P.jewels){const k=jewelKey(j);if(!g[k])g[k]={j,n:0};g[k].n++;}return Object.values(g).sort((a,b)=>a.j.tier-b.j.tier||a.j.type-b.j.type);}
function jewelRange(it,k){const a=AFFIXMAP[k];return[Math.max(1,Math.round(a.base*(it.tier+1)*0.8)),Math.round(a.base*(it.tier+1)*1.2)];}
function jewelTier(){let t=0,p=0.5;while(t<5&&Math.random()<p){t++;p*=0.5;}return t;}
function socketJewel(){const j=P.jewelSel,it=P.socketSel;if(!j||!it){flash('ジュエルと装備を選んでください');se('error');return;}
 if((it.socketed||0)>=(it.sockets||0)){flash('ソケットが一杯です（'+(it.sockets||0)+'個）');se('error');return;}
 const pool=JTYPES[j.type].affs,key=pool[Math.floor(Math.random()*pool.length)],a=AFFIXMAP[key],val=Math.max(1,Math.round(a.base*(j.tier+1)*(0.8+Math.random()*0.4)));
 it.jewelAffixes=it.jewelAffixes||{};it.jewelAffixes[key]=(it.jewelAffixes[key]||0)+val;it.socketed=(it.socketed||0)+1;const i=P.jewels.indexOf(j);if(i>=0)P.jewels.splice(i,1);P.jewelSel=null;recompute();flash('装着で確定 → '+a.n+'+'+val+'%（残ソケット'+((it.sockets||0)-it.socketed)+'）');se('enhance');}
function convertJewels(){const j=P.jewelSel;if(!j){flash('合成するジュエルを選択してください');se('error');return;}if(j.tier>=5){flash('これ以上は合成できません');se('error');return;}
 const same=P.jewels.filter(x=>x.tier===j.tier&&x.type===j.type);if(same.length<3){flash('同じ種類・レアリティが3個必要（現在'+same.length+'/3）');se('error');return;}
 for(let k=0;k<3;k++){const idx=P.jewels.indexOf(same[k]);P.jewels.splice(idx,1);}const nj=genJewel(j.tier+1,j.type);P.jewels.push(nj);P.jewelSel=null;flash('合成成功 → '+nj.name);se('enhance');}

const QPOOL=['slime','sprite','boar','hornet','fungus','wisp','salaman','magma','mantis','pixie','frost','icewisp','crystalan','prism','wraith','sentry','scarab','griffon'];
function bossQuestPool(rank){return Object.keys(MAPS).filter(id=>MAPS[id].boss&&MAPS[id].bossDef&&(!rank||questRankByLv(areaLv(id))===rank));}
function questRankByLv(lv){return lv>=45?'high':lv>=20?'mid':'low';}
function mobQuestPool(rank){const out=new Set();for(const id in MAPS){const lv=areaLv(id),r=questRankByLv(lv);if(!rank||rank===r)for(const k of MAPS[id].enemies||[])out.add(k);}return Array.from(out);}
function createQuest(rank,src){let bosses=bossQuestPool(rank);if(!bosses.length)bosses=bossQuestPool();if(bosses.length&&Math.random()<(src==='guild'?0.25:0.2)){const id=bosses[(Math.random()*bosses.length)|0],m=MAPS[id],lv=areaLv(id);return{type:'boss',key:id,jp:m.bossDef.jp,need:1,count:0,gem:Math.round((lv+8)*120),exp:Math.round((lv+8)*260),lv,rank:rank||questRankByLv(lv),accepted:false,claimed:false};}
 const pool=mobQuestPool(rank),key=(pool.length?pool:QPOOL)[(Math.random()*(pool.length?pool.length:QPOOL.length))|0],t=ET[key],lv=Math.max(1,rank==='high'?50:rank==='mid'?25:areaLv(MAPID)),need=rank==='high'?5+Math.floor(Math.random()*4):rank==='mid'?7+Math.floor(Math.random()*5):8+Math.floor(Math.random()*8);return{type:'mob',key,jp:t.jp,need,count:0,gem:Math.round(need*t.exp*(src==='npc'?5:4)),exp:Math.round(need*t.exp*(src==='npc'?8:7)),lv,rank:rank||questRankByLv(lv),accepted:false,claimed:false};}
function qLabel(q){return(q&&q.type)==='boss'?'ボス '+q.jp+' 討伐':(q.jp+'×'+q.need);}
function genQuestBoard(){P.questBoard=[];for(let i=0;i<4;i++)P.questBoard.push(createQuest(null,'guild'));}
function acceptQuest(q){if(P.quests.length>=5){flash('受注は5件まで');se('error');return;}q.accepted=true;P.quests.push(q);const bi=P.questBoard.indexOf(q);if(bi>=0)P.questBoard.splice(bi,1);flash('クエスト受注：'+qLabel(q));se('quest');}
function questProgress(key){for(const q of P.quests)if((q.type||'mob')==='mob'&&q.key===key&&q.count<q.need){q.count++;if(q.count>=q.need)flash('クエスト達成！ギルドで報酬を受け取ろう');}
 for(const n of npcs)if(n.q&&(n.q.type||'mob')==='mob'&&n.q.key===key&&n.q.count<n.q.need){n.q.count++;if(n.q.count>=n.q.need)flash(n.name+'の依頼を達成！ 話しかけて報酬を受け取ろう');}}
function questBossProgress(map){for(const q of P.quests)if(q.type==='boss'&&q.key===map&&q.count<q.need){q.count++;if(q.count>=q.need)flash('ボス討伐クエスト達成！ギルドで報酬を受け取ろう');}
 for(const n of npcs)if(n.q&&n.q.type==='boss'&&n.q.key===map&&n.q.count<n.q.need){n.q.count++;if(n.q.count>=n.q.need)flash(n.name+'のボス討伐依頼を達成！');}}
function fameNeed(lv){return Math.round(60*Math.pow(1.45,lv-1));}
function fameReward(lv){gainGem(200*lv);
 if(lv%5===0){const u=genRelic((Math.floor(lv/5)-1)%RELICS.length);if(addInvItem(u,false))dropSE(u.rar);flash('★名声Lv'+lv+'！ 固有報酬「'+u.name+'」を獲得');}
 else if(lv%2===0){const it=genItem(P.lv,false,['R','E','L'][(Math.random()*3)|0]);if(addInvItem(it,true))dropSE(it.rar);flash('名声Lv'+lv+' 到達！ 報酬装備：'+it.name);}
 else{const r=grantRandomRune(1);if(!r){const it=genItem(P.lv,false,'R');addInvItem(it,true);flash('名声Lv'+lv+' 到達！ 報酬装備：'+it.name);}else flash('名声Lv'+lv+' 到達！ ＋'+(200*lv)+'gem');}}
function addFame(n){P.fame+=n;let lv=P.fameLv||1;while(P.fame>=fameNeed(lv)){P.fame-=fameNeed(lv);lv++;fameReward(lv);}P.fameLv=lv;}
function questRewardFame(q){return q.need*3+10;}
function giveQuestReward(q){gainGem(q.gem);gainExp(q.exp);grantRandomRune(0.5);addFame(questRewardFame(q));}
function claimQuest(q){if(q.count<q.need)return;giveQuestReward(q);const i=P.quests.indexOf(q);if(i>=0)P.quests.splice(i,1);flash('\u5831\u916c\u7372\u5f97\uff1a\u25c6'+fmt(q.gem)+' / '+fmt(q.exp)+'EXP \uff0b\u540d\u58f0'+questRewardFame(q));se('quest');}

function cancelQuest(q){const i=P.quests.indexOf(q);if(i>=0)P.quests.splice(i,1);flash('クエストをキャンセルしました');se('ui');}
function refreshBoard(){const left=180000-(performance.now()-P.questBoardAt);if(left>0){flash('ボード更新まで '+Math.ceil(left/1000)+'秒');se('error');return;}genQuestBoard();P.questBoardAt=performance.now();flash('依頼ボードを更新');se('quest');}

function render(){const cx=P.x-W/2,cy=P.y-FIELD_H/2,sx=shake>0?(Math.random()-.5)*shake:0,sy=shake>0?(Math.random()-.5)*shake:0;

function drawWeatherFx(){const tm=performance.now()/1000;for(const w of weathers){if(w.map!==MAPID)continue;const c=WTYPES[w.type].col;
  const g=ctx.createRadialGradient(w.x,w.y,w.r*0.2,w.x,w.y,w.r);g.addColorStop(0,c+'33');g.addColorStop(1,c+'00');ctx.fillStyle=g;ctx.beginPath();ctx.arc(w.x,w.y,w.r,0,7);ctx.fill();

function drawPredict(){for(const c of P.channels){const s=c.spell,m=c.mod||{radiusMul:1,distMul:1},big=!!s.big,rr=(big?1+(m.radiusMul-1)*2:m.radiusMul)*rangeMul(),pr=1-c.t/c.total,rot=performance.now()/720+pr*2;
