 .mp{display:none;position:absolute;left:50%;top:50%;transform:translate(-50%,-7%);z-index:5;grid-template-columns:170px 150px 72px 72px;gap:8px;align-items:center;width:486px;font-size:11px;color:#aeb8b0;background:rgba(10,16,14,.96);border:1px solid #42605a;padding:10px;border-radius:6px;box-shadow:0 12px 34px #000a}

function spellTypeName(s){return (s.kind&&MAGIC_TYPE_DEFS[s.kind])?s.kind:(MAGIC_TYPE_BY_NAME[s.name]||MAGIC_KIND_FALLBACK[s.kind]||'通常魔法弾');}
function spellTypeDef(s){return MAGIC_TYPE_DEFS[spellTypeName(s)]||MAGIC_TYPE_DEFS['通常魔法弾'];}
function spellAction(s){return (spellTypeDef(s).kind)||s.kind;}
function spellTextLen(s){return Math.max(1,[...((s.read&&s.read[0])||s.name||'')].length);}
function spellLenBonus(s){return Math.pow(1.1,Math.min(24,spellTextLen(s)));}
function spellBigPowerMul(s){return s.big?0.3*3:1;}
function spellBasePower(s){const d=spellTypeDef(s);return d.pow*spellLenBonus(s)*spellBigPowerMul(s)*2;}
function playerSpellBasePower(s){return spellBasePower(s);}
function spellBaseCost(s){if(s.mpPct)return 0;const d=spellTypeDef(s);return d.cost*spellTextLen(s)*(s.big?3:1);}
function spellCostLabel(s){return s.mpPct?Math.round((s.mpPct||0)*100)+'%MP':Math.round(spellBaseCost(s));}

const RUNE_N=[];RUNES.forEach(r=>r.read.forEach(rd=>RUNE_N.push([rd.normalize('NFC'),r])));RUNE_N.sort((a,b)=>b[0].length-a[0].length);
function segment(nk){nk=(nk||'').normalize('NFC');let i=0,runes=[],seen=new Set();while(i<nk.length){let best=null,bl=0;
 for(const[rd,obj]of RUNE_N)if(rd.length>bl&&nk.startsWith(rd,i)&&P.runes.has(obj.name)){best=obj;bl=rd.length;}
 if(best&&i+bl<nk.length){if(!seen.has(best.name)){runes.push(best);seen.add(best.name);}i+=bl;continue;}break;}
 const rest=nk.slice(i);return{runes,spell:SPELL_N[rest]||null,rest};}
function addRuneDrain(m,kind,amount,dur){m.drainKinds=m.drainKinds||{hp:{amount:0,dur:0},mp:{amount:0,dur:0}};const d=m.drainKinds[kind];if(d){d.amount+=amount;d.dur+=dur;}}
function buildMod(runes){const m={powMul:1,mpMul:1,radiusMul:1,splashMul:1,sizeMul:1,distMul:1,castMul:1,buffDurMul:1,buffAmtMul:1,speedMul:1,durMul:1,burnMul:1,repeatMul:1,split:1,spread:null,radial:false,randomSpread:false,pierce:false,homing:false,drainKinds:{hp:{amount:0,dur:0},mp:{amount:0,dur:0}},silence:0,confuse:0};for(const r of runes)r.f(m);return m;}
function incCost(s,runes){const m=runes.mpMul!==undefined?runes:buildMod(runes),setMul=1+playerAffix('mpCost%')/100,base=s.mpPct?P.mp*s.mpPct:spellBaseCost(s);return Math.max(1,Math.round(base*m.mpMul*setMul));}

const CYCLE=['火','風','土','水'];
function typeMult(a,d){if(d==='無'||!d)return 1.0;const ai=CYCLE.indexOf(a),di=CYCLE.indexOf(d);if(ai<0||di<0)return 1.0;
 if(CYCLE[(ai+1)%4]===d)return 1.5;if(CYCLE[(di+1)%4]===a)return 0.7;return 1.0;}

  {type:'kill',key:'slime',need:3,objective:'町の外でスライムを3体倒す'},
  {type:'talk',npc:'town:ガロム',objective:'ガロムへ報告する',lines:[
   'ガロム「よし、息は上がっているが、周りを見る余裕は残っている。十分だ」',
   'ガロム「倒したスライムの跡に、薄いマナの輪が残っていただろう。普通はすぐ消える。残るのは、何かが読み取っている時だ」',
   'ガロム「ミラベルに伝えておく。君は、町の外の変化を拾える人間だ」'
  ]}
 ],rewards:{gem:120,exp:140,fame:10,titles:['tf1','tb1']}},
 {id:'main_003_windmere_message',storyKind:'main',title:'風車町の届かない伝言',after:['main_002_gate_echo'],startNpc:'town:ミラベル',steps:[
  {type:'talk',npc:'town:ミラベル',objective:'ミラベルから伝言を受け取る',lines:[
   'ミラベル「ウィンドメアから同じ伝言が三通届いたの。全部、日付だけが違って本文は同じ。少し不自然だよね」',
   'ミラベル「風車守のエイルさんは几帳面な人で、同じ失敗を繰り返すタイプじゃない。風の通り道で、何かが記憶を引っかけているのかも」',
   'ミラベル「行けそうなら、本人から話を聞いてきて。急がなくていいけど、忘れないうちに」'
  ]},
  {type:'visit',map:'windmere',objective:'ウィンドメアへ向かう'},
  {type:'talk',npc:'windmere:エイル',objective:'風車守エイルと話す',lines:[
   'エイル「リンデフィーから？　助かった。手紙を出した覚えは一通だけなんだけど、控えには三通分の封が残っていてね」',
   'エイル「風車はマナを逃がすために回している。なのに最近、羽根が同じ角度で止まる。風の流れが、同じ状態に戻されているみたいだ」',
   'エイル「これ、折れた羽根の欠片。持っていって。風が覚えていることを、誰かが消しそこねたのかもしれない」'

 ],rewards:{gem:180,exp:220,fame:14,titles:['tf2','tb2']}},
 {id:'main_004_univel_archive',storyKind:'main',title:'白く抜けた索引',after:['main_003_windmere_message'],startNpc:'windmere:エイル',steps:[
  {type:'talk',npc:'windmere:エイル',objective:'エイルから欠片の話を聞く',lines:[
   'エイル「欠片の裏、見える？　傷じゃなくて文字の跡だ。風車の部品に文字なんて入れない」',
   'エイル「王都ユニヴェルの図書館なら、古いAMC部材の記録が残っているはずだ。司書のマティカさんを訪ねて」',
   'エイル「記録は、消えたんじゃなくて読めなくされることがある。風車はその時、少しだけ軋むんだ」'
  ]},
  {type:'visit',map:'univel',objective:'王都ユニヴェルへ向かう'},
  {type:'talk',npc:'univel:マティカ',objective:'図書館司書マティカと話す',lines:[
   'マティカ「風車の欠片に、古い管理符号。興味深いですね。ここ数年、同じ符号を含む本だけ索引から抜け落ちます」',
   'マティカ「本そのものは棚にある。けれど題名を思い出せない。人も目録も、同じ題名のところで止まってしまう」',
   'マティカ「忘却はただの記憶喪失ではありません。マナを介して『思い出す動作』を邪魔する機構です。壊れているなら、広がる前に止める必要があります」'
  ]}
 ],rewards:{gem:260,exp:340,fame:18,titles:['tf3','tb3']}},
 {id:'sub_001_tina_first_spell',storyKind:'sub',title:'ティナの一行だけの呪文',after:['main_001_lindefy_record'],startNpc:'town:ティナ',steps:[
  {type:'talk',npc:'town:ティナ',objective:'ティナの相談を聞く',lines:[
   'ティナ「ねえ、ちょっとだけ手伝って。呪文ノートの最初の一行だけ、朝になると薄くなるの」',
   'ティナ「わたしの字が下手だから、じゃないよ。たぶん。たぶんね」',
   'ティナ「スライムのマナ滴を少し採ってきたら、インクを固定できるかも。危なかったらすぐ帰ってきて」'
  ]},
  {type:'kill',key:'slime',need:2,objective:'スライムを2体倒してマナ滴を集める'},
  {type:'talk',npc:'town:ティナ',objective:'ティナへ届ける',lines:[
   'ティナ「ありがとう！　うん、これなら滲まない。……あれ、ここに『朝の自分を信用しない』って書いてある」',
   'ティナ「昨日のわたし、ちょっと賢いかも。忘れるなら、忘れる前に未来の自分へ置き手紙をする。これ、使えるね」',
   'ティナ「あなたのことも書いておく。スライムに勝てる、親切、あと走るのが早い」'
  ]}
 ],rewards:{gem:90,exp:110,fame:8,titles:['tf4','tb4']}},
 {id:'sub_002_mabel_bread_memory',storyKind:'sub',title:'焼きたての匂いを追って',after:['main_002_gate_echo'],startNpc:'mabel:サナ',steps:[
  {type:'talk',npc:'mabel:サナ',objective:'メイベル村のサナと話す',lines:[
   'サナ「パンの焼き時間を間違えるなんて、十年で初めて。しかも三日続けて。笑い話にしたいけど、焦げた匂いは笑えないね」',
   'サナ「畑の外にボアが増えて、粉袋を運ぶ子たちが遠回りしてる。道を空けてくれたら、いつもの手順を思い出しやすくなる気がする」',
   'サナ「食べることは、毎日の記憶だからね。そこが乱れると村は弱る」'
  ]},
  {type:'kill',key:'boar',need:3,objective:'ボアを3体倒して粉袋の道を空ける'},
  {type:'talk',npc:'mabel:サナ',objective:'サナへ報告する',lines:[
   'サナ「助かったよ。釜の前に立ったら、作業の順番を自然に思い出せた。毎日の仕事って強いんだね」',
   'サナ「忘却ってやつが記憶を狙うなら、匂いや手触りで抵抗できるかもしれない。焼きたてを持っていきな」',
   'サナ「熱いものを持つ時は、強い人でも布を使う。これは冒険にも同じこと」'
  ]}
 ],rewards:{gem:140,exp:180,fame:12,titles:['tf5','tb5']}},
 {id:'main_005_field_stone_trace',storyKind:'main',title:'畑の石碑が覚えている',after:['main_004_univel_archive'],startNpc:'univel:マティカ',steps:[
  {type:'talk',npc:'univel:マティカ',objective:'マティカから石碑調査を頼まれる',lines:[
   'マティカ「索引から抜けた本と同じ符号が、メイベル農地の石碑にも残っています。畑に石碑。妙な組み合わせでしょう」',
   'マティカ「でも生活のそばに残った記録ほど、消されにくいことがあります。誰かが毎日見て、意味を知らなくても覚えているからです」',
   'マティカ「石碑を調べたら、村のメイさんにも話を聞いてください。畑の人は、紙より土の変化に早く気づく」'
  ]},
  {type:'visit',map:'field',objective:'メイベル農地へ向かう'},
  {type:'inspect',key:'stone:field',map:'field',objective:'メイベル農地の石碑を調べる'},
  {type:'talk',npc:'mabel:メイ',objective:'メイへ石碑の話を聞く',lines:[
   'メイ「その石碑？　子どものころからあるよ。字は読めないけど、麦の刈り始めの日に、みんな一度はあそこで手を合わせる」',
   'メイ「今年はね、誰が最初に手を合わせたかだけ、みんな思い出せない。順番なんて大事じゃないのに、そこだけ空いてると気持ち悪い」',
   'メイ「でも麦は育ってる。土の状態も変わってない。畑の作業には、まだ手がかりが残ってるんだね」'
  ]}
 ],rewards:{gem:220,exp:300,fame:16,titles:['tf7','tb7']}},
 {id:'main_006_goldhahn_account_book',storyKind:'main',title:'市場帳簿の白い行',after:['main_005_field_stone_trace'],startNpc:'mabel:メイ',steps:[
  {type:'talk',npc:'mabel:メイ',objective:'メイから市場への相談を聞く',lines:[
   'メイ「麦は育ってる。でも出荷帳簿の一行だけ、毎朝まっ白になるんだ。消えるのは量じゃなく、届け先の名前」',
   'メイ「ゴールドハーンの市場なら、帳簿係のピコが写しを持ってる。あの子、数字には厳しいから、白紙にも怒ってると思う」',
   'メイ「怒れるってことは、まだ諦めてないってことだよ。頼んだね」'
  ]},
  {type:'visit',map:'goldhahn',objective:'ゴールドハーンへ向かう'},
  {type:'talk',npc:'goldhahn:ピコ',objective:'帳簿係ピコと話す',lines:[
   'ピコ「白い行？　あります。三冊あります。腹立たしいことに、どの帳簿も同じ場所だけ空白です」',
   'ピコ「市場では数字が信用です。名前が抜けると、誰に払うべきか、誰へ謝るべきかも消える」',
   'ピコ「倉庫外に魔物が寄って、荷札の確認が止まっています。まず周囲を静かにしてください。怒るのはそれからです」'

  {type:'kill',key:'hornet',need:3,objective:'ホーネットを3体倒して倉庫外を確認する'},
  {type:'talk',npc:'goldhahn:ピコ',objective:'ピコへ報告する',lines:[
   'ピコ「荷札の裏に同じ白い粉が残っていました。紙を削った跡ではありません。読もうとすると、文字の意味だけが頭に入りません」',
   'ピコ「私は帳簿を二重にします。数字、名前、匂い、荷姿。思い出す道を一本にしない」',
   'ピコ「これをアクロスへ持っていってください。港の積荷にも、同じ空白があるはずです」'
  ]}
 ],rewards:{gem:260,exp:360,fame:18,titles:['tf8','tb8']}},
 {id:'main_007_across_shipping_void',storyKind:'main',title:'港でほどける宛名',after:['main_006_goldhahn_account_book'],startNpc:'goldhahn:ピコ',steps:[
  {type:'talk',npc:'goldhahn:ピコ',objective:'ピコから港宛ての写しを受け取る',lines:[
   'ピコ「この写しは、白い行の前後だけを残してあります。全部持つと、なぜか読む側が混乱する」',
   'ピコ「港町アクロスの倉庫番サムへ。彼は荷の傷を見るだけで、どの船で来たかわかる人です」',
   'ピコ「名前がだめなら、傷からたどる。帳簿係としては不本意ですが、有効なら使います」'

  {type:'visit',map:'acrossPort',objective:'港町アクロスへ向かう'},
  {type:'talk',npc:'acrossPort:サム',objective:'倉庫番サムと話す',lines:[
   'サム「帳簿の写し？　ああ、こっちもだ。荷はある。匂いも重さも合ってる。なのに宛名だけが読めなくなる」',
   'サム「灯台のトバリが、夜の荷印だけ変な光り方をすると言っていた。港では光が道しるべだ。そこが狂うと船も人も迷う」',
   'サム「倉庫裏のウィスプを追い払ってくれ。灯りに寄って、荷印の確認ができない」'

  {type:'kill',key:'wisp',need:3,objective:'ウィスプを3体倒して荷印を確認する'},
  {type:'talk',npc:'acrossPort:トバリ',objective:'灯台係トバリと話す',lines:[
   'トバリ「光は嘘をつかない、と思いたい。でも最近、名前のある荷札だけ、光を当てても文字が読みにくい」',
   'トバリ「忘却が名前を嫌うなら、形や傷や匂いで囲めばいい。港の仕事は、荷を迷子にしないことだからね」',
   'トバリ「グラウバッハへ行くなら、これを。工場の安全札にも同じ白い縁が出ているはずだ」'
  ]}
 ],rewards:{gem:320,exp:440,fame:20,titles:['tf9','tb9']}},
 {id:'main_008_graubach_redline',storyKind:'main',title:'赤線は誰のために残る',after:['main_007_across_shipping_void'],startNpc:'acrossPort:トバリ',steps:[
  {type:'talk',npc:'acrossPort:トバリ',objective:'トバリから工場宛ての札を受け取る',lines:[
   'トバリ「港で消える宛名と、工場で消える安全札。場所は違うけど、どちらも『人が戻るための印』だ」',
   'トバリ「グラウバッハのグラウさんに渡して。あの人は機械の音で異常を聞き分ける」',

  {type:'visit',map:'graubachCity',objective:'工業都市グラウバッハへ向かう'},
  {type:'talk',npc:'graubachCity:グラウ',objective:'工場案内人グラウと話す',lines:[

   'グラウ「作業員は線を見ている。だが『止まれ』を思い出せない。これは看板の問題じゃない。思い出す手順の問題だ」',

   'ネイラ「危険な手順を忘れさせる力が、危険から守る印まで薄めている。安全装置が安全を消しているわけだね」',

 ],rewards:{gem:380,exp:560,fame:24,titles:['tf10','tb10']}},
 {id:'main_009_deepvein_admin_trace',storyKind:'main',title:'採掘機構の管理痕',after:['main_008_graubach_redline'],startNpc:'graubachCity:ネイラ',steps:[
  {type:'talk',npc:'graubachCity:ネイラ',objective:'ネイラから鉱山調査の依頼を受ける',lines:[
   'ネイラ「古い採掘機構は、危険な坑道を閉じるために人の行動も制限していた。忘却の原型に近い」',
   'ネイラ「アイゼンロアの鑑定士キラなら、採掘機構の石碑符号を読める。まず深部の石碑を見てきて」',
   'ネイラ「危険を止める力は必要だよ。でも、誰が危険かを間違えた時、その力は一番危ない」'

  {type:'inspect',key:'stone:deepvein',map:'deepvein',objective:'ディープヴェインの石碑を調べる'},
  {type:'talk',npc:'eisenroar:キラ',objective:'鑑定士キラに石碑符号を見せる',lines:[
   'キラ「これは採掘停止符号……だけど、人員名簿の記録も混じってる。坑道を閉じる時、作業員の進入記録もまとめて切っていたんだ」',

   'キラ「アムネシア。古い管理者名が符号の底に残ってる。忘却は現象じゃなく、誰かの処理だよ」'

 ],rewards:{gem:460,exp:720,fame:28,titles:['tf11','tb11']}},
 {id:'sub_003_graubach_safety_note',storyKind:'sub',title:'安全監督の消えない赤線',after:['main_008_graubach_redline'],startNpc:'graubachCity:ネイラ',steps:[
  {type:'talk',npc:'graubachCity:ネイラ',objective:'グラウバッハのネイラと話す',lines:[
   'ネイラ「工場では忘れたで済むことと、済まないことがある。弁の閉め忘れは後者だ」',
   'ネイラ「だから赤線を床に引く。見ただけで止まれるようにね。でも今朝、その赤線だけを全員が見落とした」',

  {type:'talk',npc:'graubachCity:ネイラ',objective:'ネイラへ報告する',lines:[

   'ネイラ「私は床に赤線を二重に引く。あなたは、消されても残るものを探して」',

 {id:'sub_004_univel_sweet_receipt',storyKind:'sub',title:'菓子屋の短い領収書',after:['main_004_univel_archive'],startNpc:'univel:ロゼ',steps:[
  {type:'talk',npc:'univel:ロゼ',objective:'ロゼの相談を聞く',lines:[
   'ロゼ「お菓子の予約票って、案外その人の生活が出るんだよ。誕生日、夜勤明け、仲直り。甘いものは理由つきで買われるから」',
   'ロゼ「でも最近、理由だけが消える予約がある。名前も数もあるのに、何のために焼くのか思い出せない」',

  {type:'kill',key:'pixie',need:3,objective:'ピクシーを3体倒して砂糖袋を守る'},
  {type:'talk',npc:'univel:ロゼ',objective:'ロゼへ報告する',lines:[
   'ロゼ「助かった。予約票の理由、ひとつ戻ったよ。『夜勤の人へ、眠らないでくれてありがとう』だって」',
   'ロゼ「忘れられても、お腹は空くし、甘い匂いで帰り道を思い出すこともある。だから私は焼くよ」',
   'ロゼ「戦う人にも砂糖は必要。ほら、持っていって」'
  ]}
 ],rewards:{gem:150,exp:210,fame:12,titles:['tf12','tb12']}},
 {id:'sub_005_goldhahn_scale_weight',storyKind:'sub',title:'市場の秤は嘘をつかない',after:['main_006_goldhahn_account_book'],startNpc:'goldhahn:ハンナ',steps:[
  {type:'talk',npc:'goldhahn:ハンナ',objective:'ハンナから市場の話を聞く',lines:[
   'ハンナ「帳簿が白くなるなら、秤に聞けばいい。物の重さまでは、そう簡単に忘れないからね」',
   'ハンナ「ところが今朝、同じ麦袋を三人が三通りに読んだ。目盛りは同じなのに、読み取る数字が人によってずれる」',
   'ハンナ「市場街道の魔物で荷運びが止まってる。動かして比べないと、秤の癖も見えないんだ」'

  {type:'kill',key:'boar',need:4,objective:'ボアを4体倒して荷運びを再開させる'},
  {type:'talk',npc:'goldhahn:ハンナ',objective:'ハンナへ報告する',lines:[
   'ハンナ「動かしてみたら、秤は正しかった。間違っていたのは、読む側の記憶だね」',
   'ハンナ「重さ、匂い、手触り、顔。商売っていうのは、いくつもの確かめ方でできてる」',
   'ハンナ「ひとつ消されても、別の道でたどり着く。覚えておきな」'

 ],rewards:{gem:190,exp:260,fame:14,titles:['tf13','tb13']}},
 {id:'sub_006_across_lighthouse_shift',storyKind:'sub',title:'灯台番の交代表',after:['main_007_across_shipping_void'],startNpc:'acrossPort:トバリ',steps:[
  {type:'talk',npc:'acrossPort:トバリ',objective:'トバリの交代表を確認する',lines:[
   'トバリ「灯台は一人で守ってるように見えるけど、実際は交代表で守ってる。誰がいつ眠るかまで、灯りの一部なんだ」',
   'トバリ「その交代表から、名前じゃなくて休む時間だけ消えた。休みまで消す忘却なんて、本当に困るよ」',
   'トバリ「潮読みのマリンにも聞いてきて。海は、人の無理をすぐ見抜く」'

 {id:'main_010_mining_mech_admin_key',storyKind:'main',title:'管理者鍵は誰の手に残る',after:['main_009_deepvein_admin_trace'],startNpc:'eisenroar:キラ',steps:[

 {id:'main_011_wallguard_forbidden_pass',storyKind:'main',title:'通行証に残らない名前',after:['main_010_mining_mech_admin_key'],startNpc:'wallguard:ゼナ',steps:[

 {id:'main_012_last_hold_lamps',storyKind:'main',title:'灯り番は眠る名を呼ぶ',after:['main_011_wallguard_forbidden_pass'],startNpc:'lastHold:ネム',steps:[

 {id:'sub_008_wallguard_map_margins',storyKind:'sub',title:'地図の余白に家を描く',after:['main_011_wallguard_forbidden_pass'],startNpc:'wallguard:オリカ',steps:[

 {id:'sub_010_ruined_sankt_lost_signs',storyKind:'sub',title:'廃区の標識は二度立つ',after:['main_013_oblivion_outer_cache'],startNpc:'ruinedSankt:クレア',steps:[

 {id:'main_015_starship_failsafe',storyKind:'main',title:'墜落船のフェイルセーフ',after:['main_014_record_core_relay'],startNpc:'liberta:リベル',steps:[

 {id:'main_016_final_sector_rewrite',storyKind:'main',title:'忘却番人を書き換える',after:['main_015_starship_failsafe'],startNpc:'town:ミラベル',flags:['main_clear','amnesia_rewritten'],steps:[

 {id:'sub_011_liberta_stage_cues',storyKind:'sub',title:'舞台袖の合図帳',after:['main_014_record_core_relay'],startNpc:'liberta:エマ',steps:[

 {id:'sub_012_exile_letters',storyKind:'sub',title:'宛先のない手紙束',after:['main_015_starship_failsafe'],startNpc:'exileCamp:ノア',steps:[

   'ノア「辺境の湧き水に、手紙袋を落とした見回りがいる。水場は記憶が戻りやすいけど、古い残響も寄ってくる」'

 {id:'sub_013_ruined_sankt_flower_names',storyKind:'sub',title:'花札に戻る名前',after:['main_013_oblivion_outer_cache'],startNpc:'ruinedSankt:クレア',steps:[

   'クレア「沈黙の台地で、札を噛んだみたいな痕跡が見つかった。花壇に戻す前に、危ない残響を払ってきて」'

   'クレア「よし、これは薬草、これは毒草、これは触らない。名前が戻ったら、次は扱い方を戻さないとね」',
   'クレア「覚えるって、ただ知っているだけじゃ足りない。どう触るかまで含めて、町の知恵なんだと思う」'

 {id:'sub_014_garom_gate_checklist',storyKind:'sub',title:'門番の朝点検',after:['main_016_final_sector_rewrite'],startNpc:'town:ガロム',steps:[

   'ガロム「鉱滓の谷から古い残響が流れてきている。町に入る前に止めてくれ。平和ってのは、こういう地味な仕事の名前だ」'

   'ガロム「大事件の後こそ、小さい確認が効く。お前も暇な時は門を見に来い。暇じゃなくても来い」'

 {id:'sub_015_windmere_flour_marks',storyKind:'sub',title:'粉袋の指あと',after:['main_003_windmere_message'],startNpc:'windmere:ノル',steps:[

   'ノル「ところが最近、その指あとだけ見ても意味が戻ってこない。丘陵のマナウルフが風車道を荒らして、粉袋が散った日からだ」'

   'リッカ「このへこみ、ノルさんの親指だ。急いでる時だけ斜めに押すの。読める、読めるよ」',
   'リッカ「文字じゃなくても、仕事の癖は道しるべになるんだね。忘却って、そういう小さい道を消してくるのかも」'
  ]}
 ],rewards:{gem:180,exp:260,fame:14,titles:['tf31','tb31']}},
 {id:'sub_016_mabel_seed_labels',storyKind:'sub',title:'種札は土の匂いで読む',after:['main_005_field_stone_trace'],startNpc:'mabel:コポ',steps:[
  {type:'talk',npc:'mabel:コポ',objective:'種屋コポの種札を確認する',lines:[
   'コポ「種札の名前が薄いんだ。でも袋を開けると、どれが早蒔きでどれが遅蒔きか、鼻が先に思い出す」',
   'コポ「薬草の木立に落とした札を拾いたい。あそこは最近、マナウルフが近くてね。種を踏まれるより、札の読み方を忘れる方が怖い」'

  {type:'visit',map:'herbGrove',objective:'薬草の木立へ向かう'},
  {type:'kill',key:'manaWolf',map:'herbGrove',need:3,objective:'種札の周りのマナウルフを追い払う'},
  {type:'talk',npc:'mabel:メイ',objective:'メイへ種札を見せる',lines:[
   'メイ「この札、泥の付き方で分かる。今年の畑の北側だ。名前が薄くても、場所は分かる」',
   'メイ「人の記録も同じならいいね。紙が頼りなくなっても、手順や匂いで戻れる場所がある」'

 {id:'sub_017_univel_rollcall_margin',storyKind:'sub',title:'点呼表の余白',after:['main_004_univel_archive'],startNpc:'univel:セドリック',steps:[

 {id:'sub_018_across_cargo_knots',storyKind:'sub',title:'荷縄の結び目',after:['main_007_across_shipping_void'],startNpc:'acrossPort:サム',steps:[

 {id:'sub_019_graubach_gear_teeth',storyKind:'sub',title:'歯車屋の欠けた歯',after:['main_008_graubach_redline'],startNpc:'graubachCity:リベット',steps:[

 {id:'sub_020_eisenroar_hammer_song',storyKind:'sub',title:'親方の鎚歌',after:['main_010_mining_mech_admin_key'],startNpc:'eisenroar:ロア',steps:[

 {id:'sub_021_wallguard_supply_knots',storyKind:'sub',title:'補給袋の固結び',after:['main_011_wallguard_forbidden_pass'],startNpc:'wallguard:ミラド',steps:[

 {id:'sub_022_liberta_roof_route',storyKind:'sub',title:'屋根伝いの三歩目',after:['main_014_record_core_relay'],startNpc:'liberta:タヴィ',steps:[

 {id:'sub_023_fence_gate_lamp',storyKind:'sub',title:'境界灯の油皿',after:['main_002_gate_echo'],startNpc:'fenceEnd:フェリオ',steps:[

 {id:'sub_024_stillrow_water_turns',storyKind:'sub',title:'水番の交替石',after:['main_006_goldhahn_account_book'],startNpc:'stillrow:セト',steps:[

 {id:'sub_025_ceres_bell_rope',storyKind:'sub',title:'宿場鐘の結び目',after:['main_004_univel_archive'],startNpc:'ceres:セラ',steps:[

 {id:'sub_026_rowendil_black_path',storyKind:'sub',title:'黒い森の踏み分け',after:['main_003_windmere_message'],startNpc:'rowendil:ロウェナ',steps:[

 {id:'sub_027_timber_tree_rings',storyKind:'sub',title:'年輪のない切り株',after:['main_003_windmere_message'],startNpc:'timber:ティム',steps:[

 {id:'sub_028_hunter_quiet_tracks',storyKind:'sub',title:'静かな足跡',after:['main_003_windmere_message'],startNpc:'hunterHideout:ハルカ',steps:[

 {id:'sub_029_greenhollow_well_bucket',storyKind:'sub',title:'共同井戸の桶印',after:['main_003_windmere_message'],startNpc:'greenhollow:リーネ',steps:[

 {id:'sub_030_miralake_reflection_name',storyKind:'sub',title:'水鏡に映らない呼び名',after:['main_007_across_shipping_void'],startNpc:'miraLake:ミラ',steps:[

 {id:'sub_032_resort_booking_blank',storyKind:'sub',title:'予約帳の余白席',after:['main_007_across_shipping_void'],startNpc:'resortTown:ラナ',steps:[

 {id:'sub_033_dockside_manifest_corner',storyKind:'sub',title:'積荷目録の折り角',after:['main_007_across_shipping_void'],startNpc:'dockside:ドック',steps:[

function facilityQuestTarget(type){const ts=[];for(const id in MAPS){const m=MAPS[id];if(!m.facilities)continue;for(const f of m.facilities){if(f.type!==type)continue;const a=worldArea(id),p=(Number.isFinite(f.wx)&&Number.isFinite(f.wy))?{x:f.wx,y:f.wy}:a?worldPoint(a,f.x,f.y):null;ts.push(p?{map:id,x:f.x,y:f.y,wx:p.x,wy:p.y}:{map:id,x:f.x,y:f.y});}}ts.sort((a,b)=>questTargetDistance(a)-questTargetDistance(b));return ts[0]||null;}

function npcQuestTarget(npc){return npc?{map:npc.map,x:npc.x,y:npc.y,wx:npc.wx,wy:npc.wy,label:npc.name}:null;}
function stoneQuestTarget(step){const raw=step&&step.key&&String(step.key).startsWith('stone:')?String(step.key).slice(6):null,ss=WORLD_DATA&&WORLD_DATA.stones?WORLD_DATA.stones:[];let s=null;if(raw)s=ss.find(st=>st.id===raw||st.area===raw||st.spell===raw);if(!s&&step&&step.map)s=ss.find(st=>st.area===step.map);if(s)return{map:s.area,wx:s.x,wy:s.y,label:s.name||'記憶石'};return step&&step.map?mapTargetPoint(step.map):null;}

function randomQuestTarget(q,npc){if(!q)return null;const done=(q.count||0)>=(q.need||1);if(done)return npc?npcQuestTarget(npc):facilityQuestTarget('guild');if(q.type==='boss')return mapTargetPoint(q.key);return actualEnemyQuestTarget(q.key)||enemyQuestTarget(q.key);}
function minimapQuestTargets(){const out=[],seen=new Set();function add(kind,label,color,t,detail){if(!t)return;const p=questTargetWorldPos(t);if(!p&&!Number.isFinite(t.x))return;const k=kind+':'+Math.round((p?p.x:t.x)/80)+':'+Math.round((p?p.y:t.y)/80)+':'+label;if(seen.has(k))return;seen.add(k);out.push({...t,kind,label,color,detail});}
 const primary=storyPrimaryQuest();if(primary){const kind=storyKind(primary),st=storyCurrentStep(primary,false);add(kind==='main'?'main':'sub',kind==='main'?'MAIN':'SUB',kind==='main'?'#ffe06a':'#9fe8ff',storyQuestTarget(primary),st?storyObjectiveText(primary,false):primary.title);}
 for(const q of storyActiveQuests()){if(q===primary)continue;const kind=storyKind(q);add(kind==='main'?'main':'sub',kind==='main'?'MAIN':'SUB',kind==='main'?'#ffe06a':'#9fe8ff',storyQuestTarget(q),storyObjectiveText(q,false));}

 return out.slice(0,7);}

 const edge=(Math.random()*4)|0,spd=1.2+Math.random()*0.5;let x,y,vx,vy;
 if(edge===0){x=-30;y=140+Math.random()*(WORLD_H-280);vx=spd;vy=(Math.random()-0.5)*0.5;}
 else if(edge===1){x=WORLD_W+30;y=140+Math.random()*(WORLD_H-280);vx=-spd;vy=(Math.random()-0.5)*0.5;}
 else if(edge===2){y=-30;x=140+Math.random()*(WORLD_W-280);vy=spd;vx=(Math.random()-0.5)*0.5;}
 else{y=WORLD_H+30;x=140+Math.random()*(WORLD_W-280);vy=-spd;vx=(Math.random()-0.5)*0.5;}

];
function genJewel(tier,typeIdx){tier=Math.max(0,Math.min(5,tier));if(typeIdx===undefined)typeIdx=Math.floor(Math.random()*JTYPES.length);const tp=JTYPES[typeIdx];return{jewel:true,tier,type:typeIdx,name:JRAR[tier]+tp.n,col:tp.col};}

function jewelGroups(){const g={};for(const j of P.jewels){const k=jewelKey(j);if(!g[k])g[k]={j,n:0};g[k].n++;}return Object.values(g).sort((a,b)=>a.j.tier-b.j.tier||a.j.type-b.j.type);}
function jewelRange(it,k){const a=AFFIXMAP[k];return[Math.max(1,Math.round(a.base*(it.tier+1)*0.8)),Math.round(a.base*(it.tier+1)*1.2)];}
function jewelTier(){let t=0,p=0.5;while(t<5&&Math.random()<p){t++;p*=0.5;}return t;}
function socketJewel(){const j=P.jewelSel,it=P.socketSel;if(!j||!it){flash('ジュエルと装備を選んでください');se('error');return;}
 if((it.socketed||0)>=(it.sockets||0)){flash('ソケットが一杯です（'+(it.sockets||0)+'個）');se('error');return;}
 const pool=JTYPES[j.type].affs,key=pool[Math.floor(Math.random()*pool.length)],a=AFFIXMAP[key],val=Math.max(1,Math.round(a.base*(j.tier+1)*(0.8+Math.random()*0.4)));
 it.jewelAffixes=it.jewelAffixes||{};it.jewelAffixes[key]=(it.jewelAffixes[key]||0)+val;it.socketed=(it.socketed||0)+1;const i=P.jewels.indexOf(j);if(i>=0)P.jewels.splice(i,1);P.jewelSel=null;recompute();flash('装着で確定 → '+a.n+'+'+val+'%（残ソケット'+((it.sockets||0)-it.socketed)+'）');se('enhance');}
function convertJewels(){const j=P.jewelSel;if(!j){flash('合成するジュエルを選択してください');se('error');return;}if(j.tier>=5){flash('これ以上は合成できません');se('error');return;}
 const same=P.jewels.filter(x=>x.tier===j.tier&&x.type===j.type);if(same.length<3){flash('同じ種類・レアリティが3個必要（現在'+same.length+'/3）');se('error');return;}

const QPOOL=['slime','sprite','boar','hornet','fungus','wisp','salaman','magma','mantis','pixie','frost','icewisp','crystalan','prism','wraith','sentry','scarab','griffon'];
function bossQuestPool(rank){return Object.keys(MAPS).filter(id=>MAPS[id].boss&&MAPS[id].bossDef&&(!rank||questRankByLv(areaLv(id))===rank));}
function questRankByLv(lv){return lv>=45?'high':lv>=20?'mid':'low';}
function mobQuestPool(rank){const out=new Set();for(const id in MAPS){const lv=areaLv(id),r=questRankByLv(lv);if(!rank||rank===r)for(const k of MAPS[id].enemies||[])out.add(k);}return Array.from(out);}

 const pool=mobQuestPool(rank),key=(pool.length?pool:QPOOL)[(Math.random()*(pool.length?pool.length:QPOOL.length))|0],t=ET[key],lv=Math.max(1,rank==='high'?50:rank==='mid'?25:areaLv(MAPID)),need=rank==='high'?5+Math.floor(Math.random()*4):rank==='mid'?7+Math.floor(Math.random()*5):8+Math.floor(Math.random()*8);return{type:'mob',key,jp:t.jp,need,count:0,gem:Math.round(need*t.exp*(src==='npc'?5:4)),exp:Math.round(need*t.exp*(src==='npc'?8:7)),lv,rank:rank||questRankByLv(lv),accepted:false,claimed:false};}
function qLabel(q){q=normalizeQuest(q);return(q&&q.type)==='boss'?'ボス '+q.jp+' 討伐':(q?q.jp+'×'+q.need:'クエスト');}
function genQuestBoard(){P.questBoard=[];for(let i=0;i<4;i++)P.questBoard.push(createQuest(null,'guild'));}
function acceptQuest(q){if(P.quests.length>=5){flash('受注は5件まで');se('error');return;}const raw=q;q=normalizeQuest(q);q.accepted=true;P.quests.push(q);const bi=P.questBoard.indexOf(raw);if(bi>=0)P.questBoard.splice(bi,1);flash('クエスト受注：'+qLabel(q));se('quest');}
function questKillKey(src){if(src&&typeof src==='object')return questCanonicalKey(src.key||src.type||src.jp,src.jp);return questCanonicalKey(src);}
function progressQuestKillEntry(q,key){if(!q||q.type!=='mob'||q.count>=q.need||!questKeyMatches(q.key,key))return false;q.count=Math.min(q.need,(q.count||0)+1);return true;}
function progressMobKillQuests(src){const key=questKillKey(src);if(!key)return 0;let hits=0;for(let i=0;i<P.quests.length;i++){const q=normalizeQuest(P.quests[i]);P.quests[i]=q;if(progressQuestKillEntry(q,key)){hits++;if(q.count>=q.need)flash('クエスト達成！ギルドで報酬を受け取ろう');}}
 for(const n of npcs){if(n.q)n.q=normalizeQuest(n.q);if(progressQuestKillEntry(n.q,key)){hits++;if(n.q.count>=n.q.need)flash(n.name+'の依頼を達成！ 話しかけて報酬を受け取ろう');}}return hits;}
function progressKillQuests(src){return progressMobKillQuests(src)+progressStoryKillQuests(src);}
function questProgress(key){return progressMobKillQuests(key);}
function questBossProgress(map){for(const q of P.quests)if(q.type==='boss'&&q.key===map&&q.count<q.need){q.count++;if(q.count>=q.need)flash('ボス討伐クエスト達成！ギルドで報酬を受け取ろう');}
 for(const n of npcs)if(n.q&&n.q.type==='boss'&&n.q.key===map&&n.q.count<n.q.need){n.q.count++;if(n.q.count>=n.q.need)flash(n.name+'のボス討伐依頼を達成！');}}
function fameNeed(lv){return Math.round(60*Math.pow(1.45,lv-1));}
function fameReward(lv){gainGem(200*lv);
 if(lv%5===0){const u=genRelic((Math.floor(lv/5)-1)%RELICS.length);if(addInvItem(u,false))dropSE(u.rar);flash('★名声Lv'+lv+'！ 固有報酬「'+u.name+'」を獲得');}
 else if(lv%2===0){const it=genItem(P.lv,false,['R','E','L'][(Math.random()*3)|0]);if(addInvItem(it,true))dropSE(it.rar);flash('名声Lv'+lv+' 到達！ 報酬装備：'+it.name);}
 else{const r=grantRandomRune(1);if(!r){const it=genItem(P.lv,false,'R');addInvItem(it,true);flash('名声Lv'+lv+' 到達！ 報酬装備：'+it.name);}else flash('名声Lv'+lv+' 到達！ ＋'+(200*lv)+'gem');}}
function addFame(n){P.fame+=n;let lv=P.fameLv||1;while(P.fame>=fameNeed(lv)){P.fame-=fameNeed(lv);lv++;fameReward(lv);}P.fameLv=lv;}
function questRewardFame(q){return q.need*3+10;}
function giveQuestReward(q){gainGem(q.gem);gainExp(q.exp);grantRandomRune(0.5);addFame(questRewardFame(q));}
function claimQuest(q){if(q.count<q.need)return;giveQuestReward(q);titleRecordQuest('guild');const i=P.quests.indexOf(q);if(i>=0)P.quests.splice(i,1);flash('\u5831\u916c\u7372\u5f97\uff1a\u25c6'+fmt(q.gem)+' / '+fmt(q.exp)+'EXP \uff0b\u540d\u58f0'+questRewardFame(q));se('quest');}

function cancelQuest(q){const i=P.quests.indexOf(q);if(i>=0)P.quests.splice(i,1);flash('クエストをキャンセルしました');se('ui');}
function refreshBoard(){const left=180000-(performance.now()-P.questBoardAt);if(left>0){flash('ボード更新まで '+Math.ceil(left/1000)+'秒');se('error');return;}genQuestBoard();P.questBoardAt=performance.now();flash('依頼ボードを更新');se('quest');}

function drawPredict(){for(const c of P.channels){const s=c.spell,m=c.mod||{radiusMul:1,distMul:1},act=spellAction(s),big=!!s.big,rr=(big?1+(m.radiusMul-1)*2:m.radiusMul)*rangeMul(),pr=1-c.t/c.total,rot=performance.now()/720+pr*2;
  ctx.strokeStyle='rgba(90,170,255,.7)';ctx.fillStyle='rgba(90,170,255,.14)';ctx.lineWidth=2;
  if(act==='meteo'||act==='zone'||act==='impact'){const r=(s.radius||s.splash||90)*rr,cr=Math.max(12,r*pr);ctx.beginPath();ctx.arc(c.tx,c.ty,r,0,7);ctx.fill();ctx.stroke();drawEffectArea(s.el,c.tx,c.ty,cr,0.25+0.45*pr,rot);drawSparkles(c.tx,c.ty,cr,s.el,8+Math.floor(pr*8),c.total,0.45+0.45*pr);}
  else if(act==='self'||act==='aura'||act==='pulse'){const r=(s.radius||110)*rr,cr=Math.max(12,r*pr);ctx.beginPath();ctx.arc(P.x,P.y,r,0,7);ctx.fill();ctx.stroke();drawEffectArea(s.el,P.x,P.y,cr,0.25+0.45*pr,rot);drawSparkles(P.x,P.y,cr,s.el,8+Math.floor(pr*8),c.total,0.45+0.45*pr);}
  else if(act==='donut'){const r=(s.radius||180)*rr,inner=(s.inner||78)*rr;ctx.beginPath();ctx.arc(P.x,P.y,r,0,7);ctx.arc(P.x,P.y,inner,0,7,true);ctx.fill();ctx.stroke();ctx.beginPath();ctx.arc(P.x,P.y,inner,0,7);ctx.stroke();}
  else if(act==='front'||act==='fan'){const rad=(s.radius||140)*rr,half=act==='fan'?(s.fan||0.6):0.45,cx=P.x+Math.cos(c.aim)*rad*0.45,cy=P.y+Math.sin(c.aim)*rad*0.45,cr=Math.max(12,rad*pr*0.65);ctx.beginPath();ctx.moveTo(P.x,P.y);ctx.arc(P.x,P.y,rad,c.aim-half,c.aim+half);ctx.closePath();ctx.fill();ctx.stroke();drawEffectArea(s.el,cx,cy,cr,0.22+0.38*pr,rot);drawSparkles(cx,cy,cr,s.el,7+Math.floor(pr*7),c.total,0.4+0.4*pr);}
  else if(act==='funnel'||act==='orbit'){const cr=Math.max(12,(s.dist||72)*pr);ctx.beginPath();ctx.arc(P.x,P.y,(s.dist||72),0,7);ctx.stroke();drawEffectArea(s.el,P.x,P.y,cr,0.22+0.35*pr,rot);drawSparkles(P.x,P.y,cr,s.el,7+Math.floor(pr*7),c.total,0.35+0.4*pr);}
  else if(act==='ray'){const len=(s.len||300)*(m.distMul||1)*rangeMul(),w=(s.width||28)*rr;ctx.save();ctx.globalAlpha=.22+.35*pr;ctx.strokeStyle=s.color;ctx.lineWidth=w*2;ctx.beginPath();ctx.moveTo(P.x,P.y);ctx.lineTo(P.x+Math.cos(c.aim)*len*pr,P.y+Math.sin(c.aim)*len*pr);ctx.stroke();ctx.restore();}
  else if(act==='totem'||act==='summon'){const r=(s.radius||70)*rr;ctx.beginPath();ctx.arc(c.tx,c.ty,r,0,7);ctx.fill();ctx.stroke();drawEffectArea(s.el,c.tx,c.ty,Math.max(12,r*pr),0.22+0.38*pr,rot);}
  else if(act==='rain'){const r=(s.radius||130)*rr;ctx.beginPath();ctx.arc(c.tx,c.ty,r,0,7);ctx.fill();ctx.stroke();drawEffectArea(s.el,c.tx,c.ty,Math.max(12,r*pr),0.22+0.38*pr,rot);}
  else{const len=440*(m.distMul||1);ctx.beginPath();ctx.moveTo(P.x,P.y);ctx.lineTo(P.x+Math.cos(c.aim)*len,P.y+Math.sin(c.aim)*len);ctx.stroke();ctx.beginPath();ctx.arc(c.tx,c.ty,8,0,7);ctx.stroke();}}}
document.getElementById('ref').innerHTML='<b>M</b> キーで魔法・ルーン一覧を表示　／　属性相性: 火→風→土→水→火';
async function loadInitialSave(){let loaded=await loadFromIndexedDb(true);if(!loaded&&loadFromCookie(true)){loaded=true;saveToIndexedDb(true);}if(!loaded){const sp=townSpawn('town');enterStandaloneArea('town',sp.x,sp.y);}}
function loop(now){try{let dt=(now-last)/1000;last=now;if(dt>0.05)dt=0.05;update(dt);render();}catch(e){const t=performance.now();if(t>loopErrT){loopErrT=t+3000;console.error(e);msg='処理エラーを検出しました';msgT=2;}}requestAnimationFrame(loop);}
loadInitialSave().finally(()=>requestAnimationFrame(loop));
})();
